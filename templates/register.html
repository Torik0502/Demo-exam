<!DOCTYPE html>
<html>
<head>
    <title>Регистрация</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #0d47a1 0%, #0d47a1 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: #ffffff; border-radius: 10px; padding: 30px; width: 100%; max-width: 450px; box-shadow: 0 5px 20px rgba(0,0,0,0.2); }
        h1 { text-align: center; margin-bottom: 25px; color: #0d47a1; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #6c757d; }
        input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ffffff; border-radius: 5px; transition: 0.3s; }
        input:focus { border-color: #0d47a1; outline: none; }
        button { width: 100%; padding: 12px; background: #0d47a1; color: #ffffff; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0d47a1; transform: scale(1.02); }
        .error { background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px; margin-bottom: 20px; text-align: center; }
        .link { text-align: center; margin-top: 15px; }
        .link a { color: #0d47a1; text-decoration: none; }
        .link a:hover { text-decoration: underline; }
        .password-wrapper { position: relative; margin-bottom: 15px; }
        .password-wrapper input { margin-bottom: 0; }
        /*глазик для показа пароля*/
        .eye { position: absolute; right: 8px; top: 4px; cursor: pointer; color: #6c757d; font-size: 18px; }
        .eye:hover { color: #6c757d; }
        @media (max-width: 390px) { .container { padding: 20px; } }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" style="color: #0d47a1; text-decoration: none;">На главную</a>
        <h1>Регистрация</h1>
        
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST">
            <label>Логин:</label>
            <!--надпись внутри поля-->
            <input type="text" name="login" placeholder="минимум 6 символов(латиница)" required>
            
            <label>Пароль:</label>
            <div class="password-wrapper">
                <!--надпись внутри поля-->
                <input type="password" name="password" id="pwd" placeholder="минимум 8 символов" required>
                <span class="eye" onclick="togglePassword()">
                    <div class="eye">
                        <img src="{{ url_for('static', filename='img/eye.png') }}" alt="Глазик">
                    </div>
                </span>
            </div>
            
            <label>ФИО:</label>
            <!--надпись внутри поля-->
            <input type="text" name="fio" placeholder="Иванов Иван Иванович" required>
            
            <label>Телефон:</label>
            <!--надпись внутри поля-->
            <input type="text" name="phone" placeholder="8(999)123-45-67" required>
            
            <label>Email:</label>
            <!--надпись внутри поля-->
            <input type="email" name="email" placeholder="example@mail.ru" required>
            
            <button type="submit">Зарегистрироваться</button>
        </form>
        
        <div class="link">
            <a href="/login">Уже есть аккаунт? Войти</a>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            var x = document.getElementById('pwd');
            if (x.type === 'password') {
                x.type = 'text';
            } else {
                x.type = 'password';
            }
        }
    </script>
</body>
</html>
