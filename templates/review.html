<!DOCTYPE html>
<html>
<head>
    <title>Отзыв</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; padding: 50px; }
        .container { max-width: 500px; margin: 0 auto; background: #ffffff; border-radius: 10px; padding: 30px; }
        h1 { text-align: center; margin-bottom: 20px; color: #0d47a1; }
        p { margin-bottom: 20px; }
        textarea { width: 100%; height: 100px; padding: 10px; border: 1px solid #cec5c5; border-radius: 5px; font-family: inherit; }
        button { width: 100%; padding: 12px; background: #28a745; color: #ffffff; border: none; border-radius: 5px; cursor: pointer; margin-top: 15px; }
        button:hover { background: #218838; }
        .back { margin-top: 15px; display: block; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Оставить отзыв</h1>
        <p><strong>Курс:</strong> {{ req.course_name }}</p>
        <form method="POST">
            <textarea name="review" placeholder="Напишите ваш отзыв..." required></textarea>
            <button type="submit">Отправить</button>
        </form>
        <a href="/my" class="back">Назад</a>
    </div>
</body>
</html>
